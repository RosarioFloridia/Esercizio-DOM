<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>

    <body>
        <div>
        <h1>To-do List</h1>
        <input id="testoToDo" type="text" placeholder="..."/>
        <button class="btn" onclick="addProduct()">Aggiungi</button>
        <ul class="list-items"></ul>
        </div>
        <script>             
            const lista = document.querySelector(".list-items");

            function addProduct() {
                const valore = document.getElementById("testoToDo").value;
                const li = document.createElement("li");

                li.innerHTML = `<input type="checkbox">${valore}`
                lista.appendChild(li);
                document.getElementById("testoToDo").value = "";
            }
        </script>
    </body>
  </html>
